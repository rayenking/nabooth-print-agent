# Build Nabooth Print Agent installers (macOS / Windows / Linux).
# Standalone repo — no k3s / nabooth CD.
#
# Triggers:
#   1) Actions → Build → Run workflow  → Artifacts only
#   2) git tag v0.1.0 && git push origin v0.1.0  → Artifacts + GitHub Release
#
# Operator download: https://github.com/rayenking/nabooth-print-agent/releases/latest
# Manual dispatch never creates a Release (tag-only).
#
# Optional code signing (see SIGNING.md):
#   macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#          APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
#   Windows: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD
# Missing secrets → unsigned build still succeeds (Gatekeeper/SmartScreen will warn).
name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version (empty = tauri.conf.json)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Default read; release job elevates to write for GitHub Releases.
permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
          # macos-13 (Intel) is often unavailable / long-queued on GHA.
          # Cross-compile x64 from Apple Silicon runner instead.
          - platform: darwin-x64
            os: macos-14
            rust_target: x86_64-apple-darwin
          - platform: windows-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: linux-x64
            os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Version label
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version || '' }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V=$(node -p "require('./src-tauri/tauri.conf.json').version")
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building nabooth-print-agent v$V (${{ matrix.platform }})"

      # version comes from package.json "packageManager" only — do not also set version:
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Linux WebKit deps
        if: matrix.platform == 'linux-x64'
        run: |
          sudo apt-get update
          # ayatana only — libappindicator3-dev conflicts on Ubuntu 22.04
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: print-agent-${{ matrix.platform }}

      - name: Sync package version
        shell: bash
        run: |
          V="${{ steps.ver.outputs.version }}"
          node -e "
            const fs=require('fs');
            const p='src-tauri/tauri.conf.json';
            const j=JSON.parse(fs.readFileSync(p,'utf8'));
            j.version=process.env.V;
            fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
            const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version=process.env.V;
            fs.writeFileSync('package.json', JSON.stringify(pkg,null,2)+'\n');
          "
          sed -i.bak -E "s/^version = \".*\"/version = \"$V\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
        env:
          V: ${{ steps.ver.outputs.version }}

      # --- macOS: import Developer ID cert when secrets are present ---
      - name: Import Apple signing certificate
        if: startsWith(matrix.platform, 'darwin')
        id: apple_cert
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "APPLE_CERTIFICATE not set — macOS build will be UNSIGNED (Gatekeeper will warn)."
            echo "imported=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::error::APPLE_CERTIFICATE is set but APPLE_CERTIFICATE_PASSWORD is empty"
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/nabooth-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="${RUNNER_TEMP}/apple-certificate.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

          rm -f "$CERT_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          echo "imported=true" >> "$GITHUB_OUTPUT"
          echo "Apple certificate imported into temporary keychain."

      - name: Tauri build
        shell: bash
        env:
          # macOS sign + notarize (Tauri 2 reads these when present)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ "${{ matrix.platform }}" == darwin-* ]]; then
            if [ -n "${APPLE_CERTIFICATE:-}" ] && [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
              echo "macOS: signing with APPLE_SIGNING_IDENTITY (value not printed)."
              if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_PASSWORD:-}" ] && [ -n "${APPLE_TEAM_ID:-}" ]; then
                echo "macOS: notarization env present — Tauri will notarize during build."
              else
                echo "macOS: notarization secrets incomplete (APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID) — signed but may not notarize."
              fi
            else
              echo "macOS: unsigned build (missing APPLE_CERTIFICATE and/or APPLE_SIGNING_IDENTITY)."
            fi
          fi
          pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Cleanup Apple keychain
        if: always() && startsWith(matrix.platform, 'darwin')
        shell: bash
        run: |
          set +e
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
            echo "Temporary signing keychain removed."
          fi
          rm -f "${RUNNER_TEMP}/apple-certificate.p12" 2>/dev/null || true

      - name: Collect artifacts
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/out/${{ matrix.platform }}"
          mkdir -p "$OUT"
          shopt -s nullglob
          files=(
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/*.app
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          )
          n=0
          for f in "${files[@]}"; do
            [ -e "$f" ] || continue
            if [ -d "$f" ]; then
              base=$(basename "$f")
              (cd "$(dirname "$f")" && zip -qry "$OUT/${base}.zip" "$base")
              n=$((n+1))
            else
              cp -v "$f" "$OUT/"
              n=$((n+1))
            fi
          done
          if [ "$n" -eq 0 ]; then
            echo "No bundle files found. Tree:"
            find src-tauri/target -maxdepth 6 \( -name bundle -o -name '*.dmg' -o -name '*.msi' -o -name '*.AppImage' \) 2>/dev/null | head -50
            exit 1
          fi
          ls -la "$OUT"
          echo "dir=$OUT" >> "$GITHUB_OUTPUT"

      # --- Windows: Authenticode sign collected MSI + NSIS after pack ---
      - name: Sign Windows installers
        if: matrix.platform == 'windows-x64'
        shell: bash
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          OUT="${{ steps.pack.outputs.dir }}"

          if [ -z "${WINDOWS_CERTIFICATE:-}" ]; then
            echo "WINDOWS_CERTIFICATE not set — Windows installers UNSIGNED (SmartScreen will warn)."
            exit 0
          fi
          if [ -z "${WINDOWS_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::error::WINDOWS_CERTIFICATE is set but WINDOWS_CERTIFICATE_PASSWORD is empty"
            exit 1
          fi

          PFX="${RUNNER_TEMP}/windows-certificate.pfx"
          echo "$WINDOWS_CERTIFICATE" | base64 --decode > "$PFX"

          # Locate signtool.exe (Windows SDK on GHA windows-latest)
          SIGNTOOL=""
          for candidate in \
            "/c/Program Files (x86)/Windows Kits/10/bin/"*/x64/signtool.exe \
            "/c/Program Files/Windows Kits/10/bin/"*/x64/signtool.exe
          do
            if [ -f "$candidate" ]; then
              SIGNTOOL="$candidate"
            fi
          done
          # Prefer highest version path (glob expands sorted; last wins)
          if [ -z "$SIGNTOOL" ]; then
            SIGNTOOL=$(find "/c/Program Files (x86)/Windows Kits/10/bin" -path '*/x64/signtool.exe' 2>/dev/null | sort -V | tail -1 || true)
          fi
          if [ -z "$SIGNTOOL" ] || [ ! -f "$SIGNTOOL" ]; then
            echo "::error::signtool.exe not found — install Windows SDK on runner or fix path detection"
            rm -f "$PFX"
            exit 1
          fi
          echo "Using signtool: $SIGNTOOL"

          shopt -s nullglob
          signed=0
          for f in "$OUT"/*.msi "$OUT"/*-setup.exe; do
            [ -f "$f" ] || continue
            echo "Signing: $(basename "$f")"
            "$SIGNTOOL" sign \
              /f "$PFX" \
              /p "$WINDOWS_CERTIFICATE_PASSWORD" \
              /fd SHA256 \
              /tr http://timestamp.digicert.com \
              /td SHA256 \
              "$f"
            "$SIGNTOOL" verify /pa "$f"
            signed=$((signed + 1))
          done

          rm -f "$PFX"

          if [ "$signed" -eq 0 ]; then
            echo "::error::WINDOWS_CERTIFICATE set but no .msi / *-setup.exe found under $OUT"
            ls -la "$OUT" || true
            exit 1
          fi
          echo "Signed $signed Windows installer(s)."

      - uses: actions/upload-artifact@v4
        with:
          name: nabooth-print-agent-${{ steps.ver.outputs.version }}-${{ matrix.platform }}
          path: ${{ steps.pack.outputs.dir }}
          if-no-files-found: error
          retention-days: 30

  # Tag-only: attach installers to a GitHub Release for operator download links.
  # workflow_dispatch stays artifact-only (no junk releases).
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten and rename release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          # Artifact dirs look like:
          #   artifacts/nabooth-print-agent-0.1.0-darwin-arm64/*.dmg
          #   artifacts/nabooth-print-agent-0.1.0-windows-x64/*.msi
          map_platform() {
            local dir="$1"
            local os_label="$2"
            [ -d "$dir" ] || return 0
            for f in "$dir"/*; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              case "$os_label:$base" in
                mac-arm:*.dmg)   cp -v "$f" "release-assets/Nabooth-Print-Agent-Mac-AppleSilicon.dmg" ;;
                mac-arm:*.zip)   cp -v "$f" "release-assets/Nabooth-Print-Agent-Mac-AppleSilicon.app.zip" ;;
                mac-intel:*.dmg) cp -v "$f" "release-assets/Nabooth-Print-Agent-Mac-Intel.dmg" ;;
                mac-intel:*.zip) cp -v "$f" "release-assets/Nabooth-Print-Agent-Mac-Intel.app.zip" ;;
                win:*.msi)       cp -v "$f" "release-assets/Nabooth-Print-Agent-Windows-x64.msi" ;;
                win:*-setup.exe) cp -v "$f" "release-assets/Nabooth-Print-Agent-Windows-x64-setup.exe" ;;
                win:*.exe)       cp -v "$f" "release-assets/Nabooth-Print-Agent-Windows-x64.exe" ;;
                linux:*.AppImage) cp -v "$f" "release-assets/Nabooth-Print-Agent-Linux-x64.AppImage" ;;
                linux:*.deb)     cp -v "$f" "release-assets/Nabooth-Print-Agent-Linux-x64.deb" ;;
                *)               cp -v "$f" "release-assets/$base" ;;
              esac
            done
          }

          for dir in artifacts/nabooth-print-agent-*-darwin-arm64; do
            map_platform "$dir" mac-arm
          done
          for dir in artifacts/nabooth-print-agent-*-darwin-x64; do
            map_platform "$dir" mac-intel
          done
          for dir in artifacts/nabooth-print-agent-*-windows-x64; do
            map_platform "$dir" win
          done
          for dir in artifacts/nabooth-print-agent-*-linux-x64; do
            map_platform "$dir" linux
          done

          # Fallback: unexpected layout — flatten basenames
          if [ -z "$(ls -A release-assets 2>/dev/null || true)" ]; then
            echo "Primary rename found nothing — flattening all artifact files as-is."
            find artifacts -type f -print0 | while IFS= read -r -d '' f; do
              cp -v "$f" "release-assets/$(basename "$f")"
            done
          fi

          echo "Release assets:"
          ls -la release-assets
          count=$(find release-assets -type f | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            echo "::error::No release assets found after download"
            find artifacts -type f | head -50 || true
            exit 1
          fi
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
